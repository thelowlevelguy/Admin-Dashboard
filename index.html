<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="style.css">
	<title>Admin Dashboard</title>
</head>
<body>
	<div class="container">
		<div class="header">
			<div class="search-bar">
				<div class="search-button-icon"><img src="assets/icons/header/magnify.svg"></div>
				<div class="search-input"><input type="text" name="search"></div>
			</div>
			<div class="user-info">
				<div class="notif-icon"><img src="assets/icons/header/bell-ring-outline.svg"></div>
				<div class="user-profile-image"><img src="assets/images/naruto.png"></div>
				<div class="user-name">Naruto Uzumaki</div> 
			</div>
		</div>
		<div class="header-nav">
			<div class="user-profile-info">
				<div><img src="assets/images/naruto.png"></div>
				<div>
					<div class="hi-there">Hi, there!</div>
					<div class="fullname">Naruto Uzumaki (@Fourth-Okage)</div>
				</div>
			</div>
			<div class="header-buttons">
				<button>New</button>
				<button>Upload</button>
				<button>Share</button>
			</div>
		</div>
		<div class="section">
			<div class="projects"></div>
			<div class="announce"></div>
			<div class="trending"></div>
		</div>
		<div class="sidebar">
			<div class="dash-logo">
				<img class="board-icon" src="assets/icons/sidebar/view-dashboard.svg">
				<span>Dashboard</span>
			</div>
			<div class="nav">
				<div>
					<img class="side-icon" src="assets/icons/sidebar/home.svg">
					<span class="side-text">Home</span>
				</div>
				<div>
					<img class="side-icon" src="assets/icons/sidebar/card-account-details-outline.svg">
					<span class="side-text">Profile</span>
				</div>
				<div>
					<img class="side-icon" src="assets/icons/sidebar/message-reply.svg">
					<span class="side-text">Messages</span>
				</div>
				<div>
					<img class="side-icon" src="assets/icons/sidebar/clock-time-four.svg">
					<span class="side-text">History</span>
				</div>
				<div>
					<img class="side-icon" src="assets/icons/sidebar/file-multiple.svg">
					<span class="side-text">Tasks</span>
				</div>
				<div>
					<img class="side-icon" src="assets/icons/sidebar/account-group.svg">
					<span class="side-text">Communities</span>
				</div>
			</div>
			<div class="tools">
				<div>
					<img class="side-icon" src="assets/icons/sidebar/cog.svg">
					<span class="side-text">Settings</span>
				</div>
				<div>
					<img class="side-icon" src="assets/icons/sidebar/help-box.svg">
					<span class="side-text">Suppport</span>
				</div>
				<div>
					<img class="side-icon" src="assets/icons/sidebar/shield-check.svg">
					<span class="side-text">Privacy</span>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
