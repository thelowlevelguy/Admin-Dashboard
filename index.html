<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="style.css">
	<title>Admin Dashboard</title>
</head>
<body>
	<div class="container">
		<div class="header"></div>
		<div class="section">
			<div class="projects"></div>
			<div class="announce"></div>
			<div class="trending"></div>
		</div>
		<div class="sidebar">
			<div class="dash-logo">
				<img class="board-icon" src="assets/icons/view-dashboard.svg">
				<span>Dashboard</span>
			</div>
			<div class="nav">
				<div>
					<img class="icon" src="assets/icons/home.svg">
					<span class="side-text">Home</span>
				</div>
				<div>
					<img class="icon" src="assets/icons/card-account-details-outline.svg">
					<span class="side-text">Profile</span>
				</div>
				<div>
					<img class="icon" src="assets/icons/message-reply.svg">
					<span class="side-text">Messages</span>
				</div>
				<div>
					<img class="icon" src="assets/icons/clock-time-four.svg">
					<span class="side-text">History</span>
				</div>
				<div>
					<img class="icon" src="assets/icons/file-multiple.svg">
					<span class="side-text">Tasks</span>
				</div>
				<div>
					<img class="icon" src="assets/icons/account-group.svg">
					<span class="side-text">Communities</span>
				</div>
			</div>
			<div class="tools">
				<div>
					<img class="icon" src="assets/icons/cog.svg">
					<span class="side-text">Settings</span>
				</div>
				<div>
					<img class="icon" src="assets/icons/help-box.svg">
					<span class="side-text">Suppport</span>
				</div>
				<div>
					<img class="icon" src="assets/icons/shield-check.svg">
					<span class="side-text">Privacy</span>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
